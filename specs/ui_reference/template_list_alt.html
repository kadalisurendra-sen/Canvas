<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Virtusa DS 3.0 - Create Template Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --v-royal-purple: #5F2CFF;
            --v-coal: #151C28;
            --v-coal-60: #6D7283;
            --v-border-gray: #CFD0D6;
            --v-overlay: rgba(21, 28, 40, 0.6);
        }
        body {
            font-family: 'Montserrat', sans-serif;
        }
        .modal-overlay {
            background-color: var(--v-overlay);
            backdrop-filter: blur(4px);
        }
        .v-radio-custom:checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3ccircle cx='8' cy='8' r='3'/%3e%3c/svg%3e");
            background-color: var(--v-royal-purple);
            border-color: var(--v-royal-purple);
        }
    </style>
</head>
<body class="bg-slate-50 text-[var(--v-coal)] antialiased overflow-hidden">
<div class="fixed inset-0 z-0 flex flex-col filter blur-[4px] opacity-40 pointer-events-none">
<header class="bg-[#151C28] h-16 w-full flex items-center justify-between px-6 shadow-md">
<div class="flex items-center gap-2 text-white">
<div class="bg-[#5F2CFF] p-1 rounded">
<span class="material-symbols-outlined text-white font-bold">brush</span>
</div>
<h2 class="text-xl font-bold tracking-tight">Helio Canvas <span class="text-slate-400 font-normal text-sm ml-1">2.0</span></h2>
</div>
<div class="flex items-center gap-4">
<div class="size-9 rounded-full bg-white/20 border border-white/40 overflow-hidden">
<img alt="Admin Profile" class="object-cover w-full h-full" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYBhYQK77T8xEII7pZK1Sb2k5xOLF4v6ZqiT6IvzZMIwAEz_6_o7NgkNKo6T4__zImDR4qIVOPyQBBnjIW5Qx-bakmoIktN83NGk5jZ0bhWsBXO5Ma2VN8kDSnckmt4NSF_lEHGKy_snPaj06HFyD1_i0A7hkuqbO5R7bRcE1AudLIJC9YfhIro8dcR2PDlyvC-rPhloEDx0NIE-4KehoUh6dXgr0rAIPCIDpoIXYZq3Qfw6RBrZ656y2O6ZrKGhuO0-GeRn1NgGFx"/>
</div>
</div>
</header>
<div class="flex flex-1 pt-1">
<aside class="w-64 bg-white border-r border-slate-200 p-6 space-y-4">
<div class="h-4 bg-slate-100 rounded w-3/4"></div>
<div class="h-10 bg-[#5F2CFF]/10 border-l-4 border-[#5F2CFF] rounded-r w-full"></div>
<div class="h-10 bg-slate-50 rounded w-full"></div>
<div class="h-10 bg-slate-50 rounded w-full"></div>
</aside>
<main class="flex-1 p-8 space-y-8">
<div class="flex justify-between items-center">
<div class="space-y-2">
<div class="h-8 bg-slate-200 rounded w-64"></div>
<div class="h-4 bg-slate-100 rounded w-96"></div>
</div>
<div class="h-10 bg-[#5F2CFF] rounded-lg w-40"></div>
</div>
<div class="grid grid-cols-3 gap-6">
<div class="h-64 bg-white rounded-xl shadow-sm border border-slate-200"></div>
<div class="h-64 bg-white rounded-xl shadow-sm border border-slate-200"></div>
<div class="h-64 bg-white rounded-xl shadow-sm border border-slate-200"></div>
</div>
</main>
</div>
</div>
<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay">
<div class="bg-white w-full max-w-[600px] rounded-[16px] shadow-2xl flex flex-col overflow-hidden animate-in fade-in zoom-in duration-200">
<div class="px-8 pt-8 pb-4 flex items-center justify-between">
<h2 class="text-[24px] font-semibold text-[var(--v-coal)] leading-tight">Create New Template</h2>
<button class="text-[var(--v-coal-60)] hover:text-[var(--v-coal)] transition-colors">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
</div>
<div class="px-8 py-4 space-y-6">
<div class="space-y-4">
<label class="relative flex items-start p-5 border-2 border-[#F1F2F4] rounded-[12px] cursor-pointer transition-all group hover:bg-slate-50 has-[:checked]:border-[var(--v-royal-purple)] has-[:checked]:bg-[#F8F6FF]">
<div class="flex items-center h-6 mr-4">
<input checked="" class="v-radio-custom size-5 text-[var(--v-royal-purple)] border-[var(--v-border-gray)] focus:ring-[var(--v-royal-purple)] focus:ring-offset-0" name="template_type" type="radio"/>
</div>
<div class="flex flex-col">
<span class="font-bold text-[16px] text-[var(--v-coal)] mb-1">Create from scratch</span>
<span class="text-[14px] text-[var(--v-coal-60)] leading-[20px]">Start with a blank slate and define your own evaluation stages, fields, and scoring mechanisms.</span>
</div>
</label>
<label class="relative flex items-start p-5 border-2 border-[#F1F2F4] rounded-[12px] cursor-pointer transition-all group hover:bg-slate-50 has-[:checked]:border-[var(--v-royal-purple)] has-[:checked]:bg-[#F8F6FF]">
<div class="flex items-center h-6 mr-4">
<input class="v-radio-custom size-5 text-[var(--v-royal-purple)] border-[var(--v-border-gray)] focus:ring-[var(--v-royal-purple)] focus:ring-offset-0" name="template_type" type="radio"/>
</div>
<div class="flex flex-col w-full">
<span class="font-bold text-[16px] text-[var(--v-coal)] mb-1">Copy existing</span>
<span class="text-[14px] text-[var(--v-coal-60)] leading-[20px]">Clone a pre-built or existing template to save time and maintain organizational consistency.</span>
</div>
</label>
<div class="mt-2">
<label class="block text-[14px] font-medium text-[var(--v-coal)] mb-2" for="template-copy">Select Template to Copy</label>
<div class="relative">
<select class="w-full h-[48px] bg-white border border-[var(--v-border-gray)] rounded-[8px] px-4 text-[14px] font-medium text-[var(--v-coal)] appearance-none focus:ring-2 focus:ring-[var(--v-royal-purple)] focus:border-[var(--v-royal-purple)] placeholder:text-[var(--v-coal-60)]" id="template-copy">
<option disabled="" selected="" value="">Choose a template...</option>
<option>AI/ML Evaluation Framework</option>
<option>RPA Opportunity Assessment</option>
<option>GenAI Readiness Canvas</option>
<option>Cloud Migration Strategy</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-[var(--v-coal-60)] pointer-events-none">expand_more</span>
</div>
</div>
</div>
</div>
<div class="px-8 py-8 flex items-center justify-end gap-6">
<button class="text-[16px] font-medium text-[var(--v-coal-60)] hover:text-[var(--v-coal)] transition-colors">
                    Cancel
                </button>
<button class="h-[48px] px-8 bg-[var(--v-royal-purple)] text-white text-[16px] font-semibold rounded-[8px] hover:brightness-110 transition-all shadow-lg shadow-[#5F2CFF20]">
                    Continue
                </button>
</div>
</div>
</div>

</body></html>
