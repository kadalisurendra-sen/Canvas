<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Helio Canvas Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "v-teal": "#00ffaa",
                        "v-purple": "#4B00D1",
                        "v-blue-start": "#4029E7",
                        "v-blue-end": "#2914BF",
                        "v-text-dark": "#151C28",
                        "v-text-muted": "#73777E",
                        "v-input-border": "#E5E7EB",
                    },
                    fontFamily: {
                        "sans": ["Montserrat", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Montserrat', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            border: 1px solid #F8F9FA;
        }
        .input-style {
            border: 1px solid theme('colors.v-input-border');
            border-radius: 6px;
            padding: 14px 16px;
            width: 100%;
            font-size: 14px;
            transition: all 0.2s;
            color: theme('colors.v-text-dark');
        }
        .input-style::placeholder {
            color: #A0A4A8;
        }
        .input-style:focus {
            outline: none;
            border-color: theme('colors.v-blue-start');
            box-shadow: 0 0 0 1px theme('colors.v-blue-start');
        }
        .input-label {
            font-size: 15px;
            font-weight: 500;
            color: #151C28;
            margin-bottom: 10px;
            display: block;
        }
        .vibrant-bg {
            background: linear-gradient(180deg, #4029E7 0%, #2914BF 100%);
            position: relative;
            overflow: hidden;
            border-top-left-radius: 20px;
            border-bottom-left-radius: 20px;
        }
        .abstract-curve {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            clip-path: ellipse(120% 60% at 100% 0%);
            pointer-events: none;
        }
        .abstract-curve-2 {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(315deg, rgba(255, 255, 255, 0.05) 0%, transparent 50%);
            clip-path: ellipse(100% 50% at 0% 100%);
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-white text-v-text-dark antialiased">
<div class="flex min-h-screen">
<div class="w-full lg:w-[45%] xl:w-[40%] flex flex-col relative">
<div class="p-8">
<a class="flex items-center gap-1 text-v-text-dark font-semibold text-sm hover:opacity-70 transition-opacity" href="#">
<span class="material-symbols-outlined text-lg">chevron_left</span>
                Back
            </a>
</div>
<div class="flex-1 flex items-center justify-center px-6 md:px-12 pb-12">
<div class="w-full max-w-[500px] login-card bg-white rounded-[24px] p-8 md:p-14">
<div class="text-center mb-10">
<h1 class="text-[32px] font-bold tracking-tight mb-4">SIGN UP</h1>
<p class="text-[#73777E] text-[16px] leading-relaxed max-w-[320px] mx-auto">
                        Please enter your information to create your account
                    </p>
</div>
<form action="#" class="space-y-6" method="POST">
<div>
<label class="input-label" for="email">Email Address</label>
<input class="input-style" id="email" name="email" placeholder="Enter your email" type="email"/>
</div>
<button class="w-full bg-v-teal hover:brightness-95 transition-all py-4 rounded-full text-v-text-dark font-bold text-lg mt-4 shadow-sm" type="submit">
                        Sign Up
                    </button>
</form>
<div class="text-center mt-12 text-[15px]">
<span class="text-[#73777E]">Already have an account?</span>
<a class="text-v-purple font-bold ml-1 hover:underline" href="#">Login</a>
</div>
</div>
</div>
</div>
<div class="hidden lg:flex lg:w-[55%] xl:w-[60%] vibrant-bg items-center justify-center p-12 text-white">
<div class="abstract-curve"></div>
<div class="abstract-curve-2"></div>
<div class="relative z-10 w-full max-w-xl text-center">
<div class="flex flex-col items-center mb-10">
<div class="flex flex-col items-start gap-0">
<span class="text-[20px] font-bold tracking-wide -mb-2 z-10">virtusa</span>
<div class="flex items-center">
<span class="text-[84px] font-bold tracking-[-0.04em] leading-none flex items-center">
    hel<span class="text-white relative"><span class="absolute w-4 h-4 bg-[#02F576] rounded-full top-2 left-1/2 -translate-x-1/2"></span>ı</span>o
</span>
<div class="-ml-[1.2rem] mt-2 relative z-10">
<svg fill="none" height="84" viewBox="0 0 100 100" width="84" xmlns="http://www.w3.org/2000/svg">
<path d="M50 0C50 0 55 35 100 50C55 65 50 100 50 100C50 100 45 65 0 50C45 35 50 0 50 0Z" fill="#02F576"></path>
</svg>
</div>
</div>
</div>
</div>
<p class="text-[18px] leading-[1.6] font-medium px-8 opacity-95">
                The Virtusa Helio platform and solutions consist of a suite of agnostic agents and toolkits that are customizable to a client-approved ecosystem
            </p>
</div>
</div>
</div>
</body></html>
